<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ .Title }} - {{ .Site.Title }}</title>
  <link rel="icon" type="image/jpeg" href="/favicon.jpg?v=4" />
  <link rel="shortcut icon" href="/favicon.jpg?v=4" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand-wrap" href="/">
        <img class="brand-avatar" src="/images/avatar.jpg" alt="avatar" />
        <span class="brand-text">{{ .Site.Title }}</span>
      </a>
      <nav class="nav">
        <a href="/">首页</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <div class="content-card">
        <h1 class="post-title">{{ .Title }}</h1>
        <div class="post-meta">{{ .Date.Format "2006-01-02 15:04" }}</div>
        <div class="post-content">
          {{ .Content }}
        </div>
        <a class="back-link" href="/">← 返回首页</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      © {{ now.Format "2006" }} {{ .Site.Title }} · Powered by Hugo
    </div>
  </footer>
</body>
</html>
